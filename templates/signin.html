<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SecureCore</title>
    <link rel="stylesheet" href="../static/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body style="background-color: var(--color-bg-secondary);">
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">⬡</span>
            SecureCore
        </div>
        <button class="mobile-menu-btn">☰</button>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/login" class="active">Sign In</a></li>
            <li><a href="/logon">Register</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Access your SecureCore analytics dashboard.</p>
            </div>

            {% if message %}
            <div class="auth-alert">
                {{ message }}
            </div>
            {% endif %}

            <form action="/signin" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="user">Username</label>
                    <input type="text" id="user" name="user" class="form-control" required
                        placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required
                        placeholder="Enter your password">
                </div>

                <button type="submit" class="btn-primary btn-large" style="width: 100%; margin-top: 1rem;">Sign
                    In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/logon"
                        style="color: var(--color-accent); font-weight: 600;">Register</a></p>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            const navbar = document.querySelector('.navbar');
            if (mobileBtn) {
                mobileBtn.addEventListener('click', function() {
                    navbar.classList.toggle('active');
                });
            }
        });
    </script>
</body>

</html>
