<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SecureCore</title>
    <link rel="stylesheet" href="../static/style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap"
        rel="stylesheet">
</head>

<body style="background-color: var(--color-bg-secondary);">
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">⬡</span>
            SecureCore
        </div>
        <button class="mobile-menu-btn">☰</button>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/login">Sign In</a></li>
            <li><a href="/logon" class="active">Register</a></li>
        </ul>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join SecureCore for enterprise-grade transaction analytics.</p>
            </div>

            {% if message %}
            <div class="auth-alert">
                {{ message }}
            </div>
            {% endif %}

            <form action="/signup" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="user">Username</label>
                    <input type="text" id="user" name="user" class="form-control" required
                        placeholder="Min 6 characters">
                </div>
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required
                        placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="text" id="mobile" name="mobile" class="form-control" required
                        placeholder="10 digit number">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required
                        placeholder="Min 8 chars, 1 uppercase, 1 number">
                </div>

                <button type="submit" class="btn-primary btn-large" style="width: 100%; margin-top: 1rem;">Create
                    Account</button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login" style="color: var(--color-accent); font-weight: 600;">Sign
                        In</a></p>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const mobileBtn = document.querySelector('.mobile-menu-btn');
            const navbar = document.querySelector('.navbar');
            if (mobileBtn) {
                mobileBtn.addEventListener('click', function() {
                    navbar.classList.toggle('active');
                });
            }
        });
    </script>
</body>

</html>
